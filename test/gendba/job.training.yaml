title: JOB GenDBA Training Data
repetitions: 1
warmup: 0
timeout: 60
global_timeout: 0
fetch_result: true
query_plan:
  retrieve: true
  system_representation: true
output: test/gendba/duckdb_job_training/
systems:
  # Enable one DBMS at a time by setting disabled: false
  - title: Postgres ${version}
    dbms: postgres
    disabled: true
    parameter:
      version: "18"
  - title: Hyper ${version}
    dbms: hyper
    disabled: true
    parameter:
      version: "latest"
  - title: DuckDB ${version}
    dbms: duckdb
    disabled: false
    parameter:
      version: "latest"
  - title: Umbra ${version}
    dbms: umbra
    disabled: true
    parameter:
      version: "latest"
  - title: CedarDB ${version}
    dbms: cedardb
    disabled: true
    parameter:
      version: "latest"
benchmarks:
  - name: job
